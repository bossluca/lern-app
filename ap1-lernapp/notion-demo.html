<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Notion Klon - Demo</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    
    :root {
      --bg: #1a1a2e; /* dark theme base */
      --bg-hover: #25253d;
      --text: #e2e8f0;
      --text-muted: #64748b;
      --accent: #7c3aed;
      --sel: rgba(124, 58, 237, 0.3);
    }
    
    body {
      margin: 0; padding: 0;
      background-color: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      display: flex;
      justify-content: center;
      line-height: 1.6;
    }
    
    ::selection {
      background: var(--sel);
    }
    
    #editor-container {
      width: 100%;
      max-width: 800px;
      margin-top: 100px;
      padding: 0 40px 100px 40px;
    }
    
    .title {
      font-size: 2.8rem;
      font-weight: 700;
      margin-bottom: 30px;
      outline: none;
      border: none;
      letter-spacing: -1px;
    }
    
    .title[data-placeholder]:empty:before,
    .block[data-placeholder]:empty:focus:before {
      content: attr(data-placeholder);
      color: var(--text-muted);
      cursor: text;
      pointer-events: none;
    }

    #editor {
      min-height: 50vh;
      display: flex;
      flex-direction: column;
    }

    /* Core Block Styling */
    .block {
      outline: none;
      padding: 6px 4px;
      margin: 2px 0;
      min-height: 1.6em;
      position: relative;
      border-radius: 4px;
      transition: background-color 0.1s ease;
    }
    
    .block:empty:before {
      content: ''; /* hidden by default */
    }

    /* Formats generated by markdown shortcuts */
    .block.h1 { font-size: 2rem; font-weight: 700; margin-top: 1em; line-height: 1.2; letter-spacing: -0.5px; }
    .block.h2 { font-size: 1.5rem; font-weight: 600; margin-top: 1em; line-height: 1.3; }
    .block.h3 { font-size: 1.25rem; font-weight: 600; margin-top: 0.8em; line-height: 1.4; }
    .block.ul { display: list-item; list-style-type: disc; margin-left: 24px; }
    
    /* Top Menu (info) */
    .top-bar {
      position: fixed;
      top: 0; left: 0; right: 0;
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      background: rgba(26,26,46,0.8);
      backdrop-filter: blur(8px);
      z-index: 100;
    }
    .top-bar-title {
      font-weight: 600;
      font-size: 0.9rem;
      color: var(--text-muted);
    }
    .top-bar-badge {
      font-size: 0.8rem;
      background: rgba(124, 58, 237, 0.2);
      color: #a78bfa;
      padding: 4px 10px;
      border-radius: 4px;
      font-weight: 500;
    }

  </style>
</head>
<body>

  <div class="top-bar">
    <div class="top-bar-title">/notion-demo.html</div>
    <div class="top-bar-badge">✅ Auto-Save Aktiv</div>
  </div>

  <div id="editor-container">
    <div id="doc-title" class="title" contenteditable="true" data-placeholder="Seitentitel..."></div>
    <div id="editor">
      <!-- Blocks will be injected here -->
    </div>
  </div>

  <script>
    const editor = document.getElementById('editor');
    const docTitle = document.getElementById('doc-title');
    const STORAGE_KEY = 'notion_clone_demo_data';

    // ─── LOCAL STORAGE / AUTO-SAVE ──────────────────────────────────────
    function saveDoc() {
      const data = {
        title: docTitle.innerText,
        html: editor.innerHTML
      };
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }

    function loadDoc() {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        try {
          const data = JSON.parse(raw);
          if(data.title) docTitle.innerText = data.title;
          if(data.html && data.html.trim().length > 0) {
              editor.innerHTML = data.html;
          }
        } catch(e) {}
      }
      
      // Setup initial state if empty
      if(editor.children.length === 0) {
        createBlock();
      }
      
      // Reattach event listeners to all loaded blocks
      Array.from(editor.children).forEach(attachBlockListeners);
    }

    // ─── EDITOR MECHANICS ───────────────────────────────────────────────
    function createBlock(afterElement = null) {
      const div = document.createElement('div');
      div.className = 'block';
      div.contentEditable = 'true';
      div.setAttribute('data-placeholder', "Tippe '/' oder start mit '#' für Überschriften...");
      attachBlockListeners(div);
      
      if (afterElement) {
        afterElement.insertAdjacentElement('afterend', div);
      } else {
        editor.appendChild(div);
      }
      div.focus();
      saveDoc();
      return div;
    }

    function setCaretToEnd(el) {
      if(!el) return;
      el.focus();
      try {
          const range = document.createRange();
          const sel = window.getSelection();
          range.selectNodeContents(el);
          range.collapse(false);
          sel.removeAllRanges();
          sel.addRange(range);
      } catch (e) {}
    }

    function attachBlockListeners(block) {
      block.addEventListener('keydown', function(e) {
        
        // ENTER: Neues Element erzeugen
        if (e.key === 'Enter') {
          e.preventDefault();
          // Wenn in einer Liste formatiert, erben wir die Klasse für den neuen Block
          const newBlock = createBlock(this);
          if(this.classList.contains('ul')) {
              newBlock.className = 'block ul';
          }
        }
        
        // BACKSPACE: Verschmelzen oder löschen
        if (e.key === 'Backspace') {
          const sel = window.getSelection();
          // Check ob der Cursor am Anfang des Blocks ist
          if (sel.anchorOffset === 0 && sel.isCollapsed) {
            e.preventDefault();
            
            // Wenn der Block eine spezielle Formatierung hat, entferne diese zuerst zurück zu normal
            if (this.className !== 'block') {
                this.className = 'block';
                saveDoc();
                return;
            }

            const prev = this.previousElementSibling;
            if (prev) {
              const textToMerge = this.innerText;
              this.remove();
              prev.focus();
              
              const range = document.createRange();
              range.selectNodeContents(prev);
              range.collapse(false); // Move to end
              
              if(textToMerge) {
                  const textNode = document.createTextNode(textToMerge);
                  range.insertNode(textNode);
              }
              
              sel.removeAllRanges();
              sel.addRange(range);
              setCaretToEnd(prev);
              saveDoc();
            }
          }
        }
        
        // Pfeiltasten Nav
        if (e.key === 'ArrowUp') {
           const prev = this.previousElementSibling;
           if(prev) { prev.focus(); e.preventDefault(); }
        }
        if (e.key === 'ArrowDown') {
           const next = this.nextElementSibling;
           if(next) { next.focus(); e.preventDefault(); }
        }
      });

      // INPUT: Markdown Shortcuts (Magic!)
      block.addEventListener('input', function(e) {
        let txt = this.innerText;
        let changed = false;
        
        // Prüfen auf Shortcuts an erster Stelle
        if (txt.startsWith('# ')) {
          this.className = 'block h1';
          this.innerText = txt.substring(2);
          changed = true;
        } else if (txt.startsWith('## ')) {
          this.className = 'block h2';
          this.innerText = txt.substring(3);
          changed = true;
        } else if (txt.startsWith('### ')) {
          this.className = 'block h3';
          this.innerText = txt.substring(4);
          changed = true;
        } else if (txt.startsWith('- ')) {
          this.className = 'block ul';
          this.innerText = txt.substring(2);
          changed = true;
        }

        if (changed) {
          // Cursor ans Ende setzen nach Formatierung
          setCaretToEnd(this);
        }
        saveDoc();
      });
      
      block.addEventListener('paste', () => setTimeout(saveDoc, 10));
    }

    docTitle.addEventListener('input', saveDoc);
    
    // Starte App
    loadDoc();
  </script>
</body>
</html>
